<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Radio body -->
  <rect x="20" y="44" width="88" height="56" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="2.5"/>
  <!-- Antenna -->
  <line x1="64" y1="12" x2="64" y2="40" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  <circle cx="64" cy="12" r="3" fill="#e94560"/>
  <!-- Radio waves from antenna -->
  <path d="M38 18 Q64 0 90 18" stroke="#e94560" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M30 24 Q64 -4 98 24" stroke="#e94560" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Dial/screen -->
  <rect x="28" y="52" width="72" height="22" rx="3" fill="#16213e"/>
  <!-- Frequency text -->
  <text x="64" y="67" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#e94560">98.7 MHz</text>
  <!-- Knobs -->
  <circle cx="40" cy="86" r="8" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <circle cx="64" cy="86" r="8" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <circle cx="88" cy="86" r="8" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <!-- Knob indicators -->
  <line x1="40" y1="78" x2="40" y2="82" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="78" x2="68" y2="82" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="78" x2="88" y2="82" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>
  <!-- Speaker grille -->
  <line x1="36" y1="98" x2="92" y2="98" stroke="#e94560" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="101" x2="92" y2="101" stroke="#e94560" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="104" x2="92" y2="104" stroke="#e94560" stroke-width="1" opacity="0.4"/>
</svg>
